name: Publish PowerShell Module

on:
  workflow_dispatch:

env:
  MODULE_NAME: BicepStarterPipelines
  GALLERY_URL: https://www.powershellgallery.com/api/v2/package/
    
jobs:
  publish:
    name: Publish to PS Gallery
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
    
      - name: Pack Module
        shell: pwsh
        run: |
          $psd1 = Import-PowerShellDataFile -Path "./${{ env.MODULE_NAME }}/BicepStarterPipelines.psd1"

          @"
          <?xml version="1.0"?>
          <package>
              <metadata>
                  <id>${{ env.MODULE_NAME }}</id>
                  <version>$($psd1.ModuleVersion)</version>
                  <authors>$($psd1.Author)</authors>
                  <owners>$($psd1.Author)</owners>
                  <requireLicenseAcceptance>false</requireLicenseAcceptance>
                  <description>$($psd1.Description)</description>
                  <copyright>(c) $($psd1.Author).</copyright>
                  <tags>$($psd1.PrivateData.PSData.Tags -join " ")</tags>
                  <projectUrl>$($psd1.PrivateData.PSData.ProjectUri)</projectUrl>
              </metadata>
          </package>
          "@ | Out-File -FilePath "./${{ env.MODULE_NAME }}/BicepStarterPipelines.nuspec"

          nuget pack "./${{ env.MODULE_NAME }}" -OutputDirectory "./${{ env.MODULE_NAME }}"
    
      - name: Upload nupkg as artifact
        uses: actions/upload-artifact@v4
        with:
          name: module-package
          path: "./${{ env.MODULE_NAME }}"

      - name: Push Module
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem -Path "./${{ env.MODULE_NAME }}" -Filter *.nupkg
          nuget push $nupkg -ApiKey ${{ secrets.PS_GALLERY_TOKEN }} -Source ${{ env.GALLERY_URL }}
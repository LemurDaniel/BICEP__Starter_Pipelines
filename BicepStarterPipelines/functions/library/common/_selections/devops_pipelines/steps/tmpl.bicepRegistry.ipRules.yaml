parameters:
  - name: serviceConnection
    type: string

  - name: condition
    type: string
    default: always()

  - name: restrictionMode
    values:
      - AllowAccess
      - RemoveAccess
    default: RemoveAccess

  # Name or Id of the registries
  # Single mode
  #  - registries: acr-bla-dev-001
  # Multi mode
  #  - registries: |
  #     acr-bla-dev-001
  #     acr-bla-dev-002
  - name: registries
    type: string
    default: ''

  # others
  - name: azurePowerShellVersion
    type: string
    default: LatestVersion

steps:
  - task: AzurePowerShell@5
    ${{ if eq(parameters.restrictionMode, 'AllowAccess') }}:
      displayName: "Add ACR IP Rule"
    ${{ else }}:
      displayName: "Remove ACR IP Rule"
    condition: and(${{ parameters.condition }}, always())
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      azurePowerShellVersion: LatestVersion
      ScriptType: inlineScript
      pwsh: true
      inline: |

        $agentHostPublicIp = Invoke-RestMethod -Uri "https://api.ipify.org"

        $contexts = @()
        $defaultContext = Get-AzContext
        foreach($subscription in (Get-AzSubscription)) {
          $contexts += Set-AzContext -SubscriptionId $subscription.Id
        }

        Set-AzContext -Context $defaultContext

        #/////////////////////////////////////////////////////////////////////////////////////
        #///// Search available Contexts for registries

        $registries = "${{ parameters.registries }}" -replace "`r`n", "," -replace "`n", "," -split ','
        | Where-Object { -NOT [System.String]::IsNullOrEmpty($_) } 
        | ForEach-Object {
          $name = $_ -split '/' | Select-Object -Last 1

          foreach($context in $contexts) {
            Write-Host "Searching for Registry: $name in context: $($context.Subscription.Id)"

            $registry = Get-AzResource -AzContext $context -Name $name -ResourceType Microsoft.ContainerRegistry/registries 
            if($null -NE $registry) {
              $registry = Get-AzContainerRegistry -Name $name -ResourceGroupName $registry.ResourceGroupName -AzureRMContext $context
              $registry | Add-Member NoteProperty AzContext $context -Force
              return $registry
            }
          }

          Write-Error "Container Registry not found: $name"
        }


        #/////////////////////////////////////////////////////////////////////////////////////
        #///// Remove previously set access restriction

        foreach($registry in $registries) {
          Write-Host "############################################"
          Write-Host "#### Removing access restriction from Container Registry: $($registry.Name)"

          $rules = $registry.NetworkRuleSetIPRule ?? @()
          $rules = $rules | Where-Object -Property IPAddressOrRange -NE $agentHostPublicIp

          Write-Host "$($rules | ConvertTo-Json)"

          if($rules.Count -EQ 0) {
            $rules = @()
          }

          $result = Update-AzContainerRegistry -AzureRMContext $registry.AzContext -Name $registry.Name `
            -ResourceGroupName $registry.ResourceGroupName `
            -NetworkRuleBypassOption $registry.NetworkRuleBypassOption `
            -NetworkRuleSetDefaultAction $registry.NetworkRuleSetDefaultAction `
            -NetworkRuleSetIPRule $rules

          $result | Select-Object -Property Name, Location, NetworkRuleSetDefaultAction, NetworkRuleSetIPRule
        }


        #/////////////////////////////////////////////////////////////////////////////////////
        #///// Add the new access restriction 
        if('${{ parameters.restrictionMode }}' -NE 'AllowAccess') {
          return
        }

        Write-Host "/////////////////////////////////////////////////////////////////////////////////////"
        Write-Host "Public IP of agent to add: $agentHostPublicIp"
  
        foreach($registry in $registries) {
            Write-Host "/////////////////////////////////////////////////////////////////////////////////////"
            Write-Host "//// Adding access restriction Adding access restriction to Container Registry: $($registry.Name)"

            $rules = $registry.NetworkRuleSetIPRule ?? @()

            if($registry.NetworkRuleSetDefaultAction -EQ 'Allow') {
              Write-Host "Default action is Allow, skipping Adding of IP rules."
              continue
            }

            if($agentHostPublicIp -IN $rules.IPAddressOrRange) {
              Write-Host "IP already exists in rules, skipping..."
              continue
            }

            $rules += New-AzContainerRegistryIPRuleObject -Action 'Allow' -IPAddressOrRange $agentHostPublicIp

            Write-Host "$($rules | ConvertTo-Json)"

            $result = Update-AzContainerRegistry -AzureRMContext $registry.AzContext -Name $registry.Name `
              -ResourceGroupName $registry.ResourceGroupName `
              -NetworkRuleBypassOption $registry.NetworkRuleBypassOption `
              -NetworkRuleSetDefaultAction $registry.NetworkRuleSetDefaultAction `
              -NetworkRuleSetIPRule $rules

            $result | Select-Object -Property Name, Location, NetworkRuleSetDefaultAction, NetworkRuleSetIPRule
        }
